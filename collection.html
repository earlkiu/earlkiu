<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — Earl Kiu</title>
<meta name="description" content="Portrait and fashion collections by Earl Kiu, photographer based in Kuala Lumpur, Malaysia.">
<meta name="author" content="Earl Kiu">
<link rel="canonical" href="https://earlkiu.com/collection">

<meta property="og:type" content="website">
<meta property="og:url" content="https://earlkiu.com/collection">
<meta property="og:title" content="Collection — Earl Kiu">

<!-- Load collections — must be before main script -->
<script src="/collections.js"></script>

<style>
@import url('https://use.typekit.net/pur8tye.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n100: #F2F0ED;
  --n200: #DDDAD6;
  --n300: #B0ACA7;
  --n400: #7A7672;
  --n500: #3F3D3A;
  --n600: #1E1C1A;
  --n700: #100F0D;
  --font: 'artifex-hand-cf', Georgia, serif;
}

html { font-size: 16px; }

body {
  background: var(--n100);
  color: var(--n700);
  font-family: var(--font);
  min-height: 100vh;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 40px 52px;
  mix-blend-mode: multiply;
}

@media (max-width: 767px) { nav { padding: 28px 24px; } }

.nav-left { display: flex; flex-direction: column; gap: 2px; }

.nav-brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--n700);
  text-decoration: none;
}

.nav-location {
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--n300);
}

.nav-links { display: flex; gap: 36px; list-style: none; }

@media (max-width: 767px) { .nav-links { gap: 20px; } }

.nav-links a {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--n400);
  text-decoration: none;
  transition: color 0.3s ease;
}

.nav-links a:hover,
.nav-links a.active { color: var(--n700); }

.page {
  padding: 160px 52px 120px;
}

@media (max-width: 767px) { .page { padding: 100px 24px 80px; } }

.page-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--n400);
  display: block;
  margin-bottom: 64px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3px;
}

@media (max-width: 767px) {
  .grid { grid-template-columns: 1fr 1fr; }
}

.grid-item {
  position: relative;
  text-decoration: none;
  display: block;
  overflow: hidden;
}

.grid-item img {
  width: 100%;
  display: block;
  aspect-ratio: 3/4;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.grid-item:hover img {
  transform: scale(1.03);
}

.grid-item-info {
  padding: 14px 0 32px;
}

.grid-item-category {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--n400);
  display: block;
  margin-bottom: 4px;
}

.grid-item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--n700);
  letter-spacing: -0.01em;
}

nav, .page {
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

nav { animation-delay: 0s; }
.page { animation-delay: 0.1s; }

@keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-brand" href="/">Earl Kiu</a>
    <span class="nav-location">Kuala Lumpur, Malaysia</span>
  </div>
  <ul class="nav-links">
    <li><a href="/">People</a></li>
    <li><a href="/street.html">Street</a></li>
    <li><a href="/about.html">About</a></li>
  </ul>
</nav>

<main class="page">

  <span class="page-label">Collection</span>

  <!-- DO NOT TOUCH — grid is built by the script below from collections.js -->
  <div class="grid" id="collection-grid"></div>

</main>

<script>
(function () {
  const grid = document.getElementById('collection-grid');

  // Newest first — reverse the array
  const ordered = [...collections].reverse();

  ordered.forEach((item, i) => {
    const a = document.createElement('a');
    a.className = 'grid-item';
    a.href = item.url;

    const img = document.createElement('img');
    img.src = item.cover;
    img.alt = item.title + ', ' + item.year;
    img.loading = i === 0 ? 'eager' : 'lazy';

    const info = document.createElement('div');
    info.className = 'grid-item-info';
    info.innerHTML = `
      <span class="grid-item-category">${item.category}</span>
      <span class="grid-item-title">${item.title}</span>
    `;

    a.appendChild(img);
    a.appendChild(info);
    grid.appendChild(a);
  });
})();
</script>

</body>
</html>
