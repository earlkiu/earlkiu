<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  const counter = document.getElementById('counter');
  const navPrevCol = document.getElementById('nav-prev-col');
  const navNextCol = document.getElementById('nav-next-col');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const total = slides.length;
  let current = 0;

  // Wire up prev/next from collections.js — always visible
  (function () {
    const currentPath = window.location.pathname.replace(/\/$/, '');
    const index = collections.findIndex(c => c.url.replace(/\/$/, '') === currentPath);

    if (index > 0) {
      navPrevCol.href = collections[index - 1].url;
      navPrevCol.textContent = '\u2190 ' + collections[index - 1].title;
      navPrevCol.classList.remove('hidden');
    }

    if (index < collections.length - 1) {
      navNextCol.href = collections[index + 1].url;
      navNextCol.textContent = collections[index + 1].title + ' \u2192';
      navNextCol.classList.remove('hidden');
    }
  })();

  function goTo(i) {
    slides[current].classList.remove('active');
    current = i;
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    prev.className = 'arrow arrow-prev' + (current === 0 ? ' disabled' : '');
    next.className = 'arrow arrow-next' + (current === total - 1 ? ' disabled' : '');
  }

  prev.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
  next.addEventListener('click', () => { if (current < total - 1) goTo(current + 1); });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' && current > 0) goTo(current - 1);
    if (e.key === 'ArrowRight' && current < total - 1) goTo(current + 1);
  });

  let tx = 0;
  document.getElementById('slider').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  document.getElementById('slider').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) {
      if (dx < 0 && current < total - 1) goTo(current + 1);
      if (dx > 0 && current > 0) goTo(current - 1);
    }
  }, { passive: true });
</script>
