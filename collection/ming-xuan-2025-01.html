<style>
@import url('https://use.typekit.net/pur8tye.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n100: #F2F0ED;
  --n200: #DDDAD6;
  --n300: #B0ACA7;
  --n400: #7A7672;
  --n500: #3F3D3A;

html { font-size: 16px; }

body {

}

nav {

@media (max-width: 767px) { nav { padding: 28px 24px; } }

.nav-left { display: flex; flex-direction: column; gap: 2px; }

.nav-brand {

  text-transform: uppercase;

.collection-header {

}

@media (max-width: 767px) { .collection-header { padding: 100px 24px 48px; } }

.collection-category {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;

  display: block;
  margin-bottom: 12px;
}

.collection-title {
  font-size: clamp(32px, 5vw, 64px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.0;
  color: var(--n700);
}

.collection-images {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  grid-auto-flow: dense;
}

.collection-images img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  cursor: zoom-in;
}

.collection-images .portrait {
  grid-column: span 1;
  aspect-ratio: 3/4;
}

.collection-images .landscape {
  grid-column: span 3;
  aspect-ratio: 16/10;
}

.collection-footer {
  padding: 56px 52px 80px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-top: 1px solid var(--n200);
  margin-top: 3px;
}

@media (max-width: 767px) {
  .collection-footer {
    padding: 40px 24px 60px;
    flex-direction: column;
    gap: 32px;
    align-items: flex-start;
  }
}

.collection-credits { display: flex; flex-direction: column; gap: 6px; }

.credit-line {
  font-size: 11px;
  color: var(--n400);
  letter-spacing: 0.04em;
}

.credit-line a {
  color: var(--n400);
  text-decoration: none;
  border-bottom: 1px solid var(--n200);
  padding-bottom: 1px;
  transition: border-color 0.3s ease, color 0.3s ease;
}

.credit-line a:hover {
  color: var(--n700);
  border-color: var(--n400);
}

.collection-nav { display: flex; gap: 36px; align-items: center; }

.nav-prev, .nav-next {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-decoration: none;
}

.nav-prev.active, .nav-next.active {
  color: var(--n400);
  transition: color 0.3s ease;
}

.nav-prev.active:hover, .nav-next.active:hover { color: var(--n700); }
.nav-prev.disabled, .nav-next.disabled { color: var(--n200); pointer-events: none; }

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(16,15,13,0.97);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

.lightbox.open { display: flex; }

.lightbox-img-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.lightbox img {
  max-width: 88vw;
  max-height: 88vh;
  object-fit: contain;
  display: block;
  user-select: none;
  pointer-events: none;
}

.lightbox-close {
  position: absolute;
  top: 36px;
  right: 52px;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--n400);
  cursor: pointer;
  transition: color 0.3s ease;
  z-index: 2;
}

.lightbox-close:hover { color: var(--n100); }

.lightbox-prev, .lightbox-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.3s ease;
  z-index: 2;
  padding: 20px;
}

.lightbox-prev { left: 36px; }
.lightbox-next { right: 36px; }
.lightbox-prev.active, .lightbox-next.active { color: var(--n400); }
.lightbox-prev.active:hover, .lightbox-next.active:hover { color: var(--n100); }
.lightbox-prev.disabled, .lightbox-next.disabled { color: var(--n600); pointer-events: none; }

@media (max-width: 767px) {
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }
  .lightbox-close { right: 24px; top: 24px; }
}

nav, .collection-header, .collection-images, .collection-footer {
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

nav { animation-delay: 0s; }

.collection-images { animation-delay: 0.2s; }
.collection-footer { animation-delay: 0.3s; }

@keyframes fadeIn { to { opacity: 1; } }

<script>
// ─────────────────────────────────────────────
// CHANGE 1 — Alt text: "Talent Name Year — Earl Kiu"
// ─────────────────────────────────────────────
const ALT = 'Ming Xuan 2025 — Earl Kiu';

// ─────────────────────────────────────────────
// CHANGE 2 — Paste all Cloudinary image URLs here, in order.
// Portrait and landscape are detected automatically.
// Order in this array = order on page.
// ─────────────────────────────────────────────
const imageUrls = [
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116539/Ming-Xuan-14-08-25-0087_k8gptw.jpg',
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116537/Ming_Xuan_14-08-25_0327_rhrvtw.jpg',
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116536/Ming_Xuan_14-08-25_0119_cxtg8n.jpg',
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116536/Ming_Xuan_14-08-25_0541_gi528n.jpg',
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116534/Ming_Xuan_14-08-25_0120_vzgmva.jpg',
  'https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779116534/Ming_Xuan_14-08-25_0603_p35wmc.jpg',
  // add more lines as needed
];

// ─────────────────────────────────────────────
// DO NOT TOUCH BELOW THIS LINE
// ─────────────────────────────────────────────

// ── Prev / Next from collections.js ──
(function () {
  const current = window.location.pathname.replace(/\/$/, '');
  const index = collections.findIndex(c => c.url.replace(/\/$/, '') === current);

  const prevEl = document.getElementById('nav-prev');
  const nextEl = document.getElementById('nav-next');

  if (index > 0) {
    prevEl.href = collections[index - 1].url;
    prevEl.className = 'nav-prev active';
  }

  if (index < collections.length - 1) {
    nextEl.href = collections[index + 1].url;
    nextEl.className = 'nav-next active';
  }
})();

// ── Gallery ──
const gallery = document.getElementById('gallery');

async function detectOrientation(urls) {
  return Promise.all(urls.map(url => new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ url, isPortrait: img.naturalHeight > img.naturalWidth });
    img.onerror = () => resolve({ url, isPortrait: true });
    img.src = url;
  })));
}

async function buildGallery() {
  const items = await detectOrientation(imageUrls);

  items.forEach((item, i) => {
    const img = document.createElement('img');
    img.src = item.url;
    img.alt = ALT;
    img.loading = i === 0 ? 'eager' : 'lazy';
    img.className = item.isPortrait ? 'portrait' : 'landscape';
    gallery.appendChild(img);
  });

  initLightbox();
}

// ── Lightbox ──
function initLightbox() {
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxClose = document.getElementById('lightbox-close');
  const lightboxPrev = document.getElementById('lightbox-prev');
  const lightboxNext = document.getElementById('lightbox-next');
  const images = Array.from(document.querySelectorAll('#gallery img'));
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = images[currentIndex].src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateNav();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lightboxImg.src = '';
  }

  function updateNav() {
    lightboxPrev.className = 'lightbox-prev ' + (currentIndex > 0 ? 'active' : 'disabled');
    lightboxNext.className = 'lightbox-next ' + (currentIndex < images.length - 1 ? 'active' : 'disabled');
  }

  function goTo(index) {
    if (index < 0 || index > images.length - 1) return;
    currentIndex = index;
    lightboxImg.src = images[currentIndex].src;
    updateNav();
  }

  images.forEach((img, i) => img.addEventListener('click', () => openLightbox(i)));
  lightboxClose.addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
  lightbox.addEventListener('click', closeLightbox);
  lightboxImg.addEventListener('click', e => e.stopPropagation());

  lightboxPrev.addEventListener('click', e => { e.stopPropagation(); goTo(currentIndex - 1); });
  lightboxNext.addEventListener('click', e => { e.stopPropagation(); goTo(currentIndex + 1); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  });

  let touchStartX = 0;
  let touchStartY = 0;

  lightbox.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  lightbox.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) goTo(currentIndex + 1);
      else goTo(currentIndex - 1);
    }
  }, { passive: true });
}

buildGallery();
</script>
