<style>
@import url('https://use.typekit.net/pur8tye.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n100: #F2F0ED;
  --n200: #DDDAD6;
  --n300: #B0ACA7;
  --n400: #7A7672;
  --n500: #3F3D3A;
  --n600: #1E1C1A;
  --n700: #100F0D;
  --font: 'artifex-hand-cf', Georgia, serif;
}

html { font-size: 16px; }

body {
  background: var(--n100);
  color: var(--n700);
  font-family: var(--font);
  min-height: 100vh;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 40px 52px;

}

@media (max-width: 767px) { nav { padding: 28px 24px; } }

.nav-left { display: flex; flex-direction: column; gap: 2px; }

.nav-brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--n700);
  text-decoration: none;
}

.nav-location {
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--n300);
}

.nav-back {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--n400);
  text-decoration: none;
  transition: color 0.3s ease;
}

.nav-back:hover { color: var(--n700); }

.collection-header {
  padding: 160px 52px 64px;
}

@media (max-width: 767px) { .collection-header { padding: 100px 24px 48px; } }

.collection-category {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--n400);
  display: block;
  margin-bottom: 12px;
}

.collection-title {
  font-size: clamp(32px, 5vw, 64px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.0;
  color: var(--n700);
}

.collection-subtitle {
  font-size: 15px;
  font-weight: 400;
  color: var(--n400);
  letter-spacing: 0.06em;
  display: block;
  margin-top: 10px;
}

.collection-images {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.img-full img {
  width: 100%;
  display: block;
  object-fit: cover;
  cursor: zoom-in;
}

.img-full img.portrait { aspect-ratio: 3/4; }
.img-full img.landscape { aspect-ratio: 16/10; }

.img-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}

.img-pair img {
  width: 100%;
  display: block;
  aspect-ratio: 3/4;
  object-fit: cover;
  cursor: zoom-in;
}

.collection-footer {
  padding: 56px 52px 80px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-top: 1px solid var(--n200);
  margin-top: 3px;
}

@media (max-width: 767px) {
  .collection-footer {
    padding: 40px 24px 60px;
    flex-direction: column;
    gap: 32px;
    align-items: flex-start;
  }
}

.collection-credits { display: flex; flex-direction: column; gap: 6px; }

.credit-line {
  font-size: 11px;
  color: var(--n400);
  letter-spacing: 0.04em;
}

.credit-line a {
  color: var(--n400);
  text-decoration: none;
  border-bottom: 1px solid var(--n200);
  padding-bottom: 1px;
  transition: border-color 0.3s ease, color 0.3s ease;
}

.credit-line a:hover {
  color: var(--n700);
  border-color: var(--n400);
}

.collection-nav { display: flex; gap: 36px; align-items: center; }

.nav-prev, .nav-next {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-decoration: none;
}

.nav-prev.active, .nav-next.active {
  color: var(--n400);
  transition: color 0.3s ease;
}

.nav-prev.active:hover, .nav-next.active:hover { color: var(--n700); }

.nav-prev.disabled, .nav-next.disabled {
  color: var(--n200);
  pointer-events: none;
}

/* ─── LIGHTBOX ─── */

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(16,15,13,0.97);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

.lightbox.open { display: flex; }

.lightbox-img-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.lightbox img {
  max-width: 88vw;
  max-height: 88vh;
  object-fit: contain;
  display: block;
  user-select: none;
}

.lightbox-close {
  position: absolute;
  top: 36px;
  right: 52px;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--n400);
  cursor: pointer;
  transition: color 0.3s ease;
  z-index: 2;
}

.lightbox-close:hover { color: var(--n100); }

.lightbox-prev, .lightbox-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.3s ease;
  z-index: 2;
  padding: 20px;
}

.lightbox-prev { left: 36px; }
.lightbox-next { right: 36px; }
.lightbox-prev.active, .lightbox-next.active { color: var(--n400); }
.lightbox-prev.active:hover, .lightbox-next.active:hover { color: var(--n100); }
.lightbox-prev.disabled, .lightbox-next.disabled { color: var(--n600); pointer-events: none; }

@media (max-width: 767px) {
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }
  .lightbox-close { right: 24px; top: 24px; }
}

nav, .collection-header, .collection-images, .collection-footer {
  opacity: 0;
  animation: fadeIn 1s ease 0.2s forwards;
}

nav { animation-delay: 0s; }

@keyframes fadeIn { to { opacity: 1; } }
</style>

<body>

<nav>
  <div class="nav-left">
    <a class="nav-brand" href="/">Earl Kiu</a>
    <span class="nav-location">Kuala Lumpur, Malaysia</span>
  </div>
  <a class="nav-back" href="/collection.html">← Collection</a>
</nav>

<div class="collection-header">
  <span class="collection-category">People · 2025</span>
  <h1 class="collection-title">Zyra</h1>
  <span class="collection-subtitle">May 2025</span>
</div>

<div class="collection-images">

  <div class="img-full">
    <img class="portrait" src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119889/Zyra_03-05-25_10422_x4wroh.jpg" alt="Zyra May 2025 — Earl Kiu" loading="eager"/>
  </div>

  <div class="img-full">
    <img class="landscape" src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119897/Zyra_03-05-25_10526_ivngdo.jpg" alt="Zyra May 2025 — Earl Kiu" loading="lazy"/>
  </div>

  <div class="img-pair">
    <img src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119893/Zyra_03-05-25_10499_xnzgbx.jpg" alt="Zyra May 2025 — Earl Kiu" loading="lazy"/>
    <img src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119887/Zyra_03-05-25_10570_hzuhdt.jpg" alt="Zyra May 2025 — Earl Kiu" loading="lazy"/>
  </div>

  <div class="img-full">
    <img class="landscape" src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119891/Zyra_03-05-25_10604_gf0afw.jpg" alt="Zyra May 2025 — Earl Kiu" loading="lazy"/>
  </div>

  <div class="img-full">
    <img class="portrait" src="https://res.cloudinary.com/dljk05sju/image/upload/q_auto/f_auto/v1779119884/Zyra_03-05-25_10657_aqdnnd.jpg" alt="Zyra May 2025 — Earl Kiu" loading="lazy"/>
  </div>

</div>

<div class="collection-footer">
  <div class="collection-credits">
    <span class="credit-line">Talent — <a href="https://www.instagram.com/kaznoiryra/" target="_blank" rel="noopener">Zyra</a> · Studio — <a href="https://www.elenablair.com" target="_blank" rel="noopener">Elena Blair</a></span>
  </div>
  <div class="collection-nav">
    <a class="nav-prev disabled">← Prev</a>
    <a class="nav-next disabled">Next →</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">Close</span>
  <span class="lightbox-prev" id="lightbox-prev">←</span>
  <div class="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt=""/>
  </div>
  <span class="lightbox-next" id="lightbox-next">→</span>
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxClose = document.getElementById('lightbox-close');
  const lightboxPrev = document.getElementById('lightbox-prev');
  const lightboxNext = document.getElementById('lightbox-next');

  const images = Array.from(document.querySelectorAll('.collection-images img'));
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = images[currentIndex].src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightboxNav();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lightboxImg.src = '';
  }

  function updateLightboxNav() {
    lightboxPrev.className = 'lightbox-prev ' + (currentIndex > 0 ? 'active' : 'disabled');
    lightboxNext.className = 'lightbox-next ' + (currentIndex < images.length - 1 ? 'active' : 'disabled');
  }

  images.forEach((img, i) => {
    img.addEventListener('click', () => openLightbox(i));
  });

  lightboxClose.addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });

  lightboxPrev.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex > 0) { currentIndex--; lightboxImg.src = images[currentIndex].src; updateLightboxNav(); }
  });

  lightboxNext.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex < images.length - 1) { currentIndex++; lightboxImg.src = images[currentIndex].src; updateLightboxNav(); }
  });

  lightbox.addEventListener('click', closeLightbox);

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; lightboxImg.src = images[currentIndex].src; updateLightboxNav(); }
    if (e.key === 'ArrowRight' && currentIndex < images.length - 1) { currentIndex++; lightboxImg.src = images[currentIndex].src; updateLightboxNav(); }
  });
</script>

</body>
