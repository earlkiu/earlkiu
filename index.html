<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earl Kiu — Portrait Photography, Kuala Lumpur</title>

<style>
@import url('https://use.typekit.net/pur8tye.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n100: #F2F0ED;
  --n200: #DDDAD6;
  --n300: #B0ACA7;
  --n400: #7A7672;
  --n500: #3F3D3A;
  --n600: #1E1C1A;
  --n700: #100F0D;
  --font: 'artifex-hand-cf', Georgia, serif;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--n700);
  color: var(--n100);
  font-family: var(--font);
}

/* ─── SLIDER ─── */

.slider {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.8s ease-in-out;
  background-size: cover;
  background-position: center;
  will-change: opacity;
}

.slide.active { opacity: 1; }

/* Placeholder slides — replace background-image with your Cloudinary URLs */
.slide-1 { background-image: url('https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1600&q=80&fit=crop'); }
.slide-2 { background-image: url('https://images.unsplash.com/photo-1509631179647-0177331693ae?w=1600&q=80&fit=crop'); }
.slide-3 { background-image: url('https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1600&q=80&fit=crop&sat=-80'); }
.slide-4 { background-image: url('https://images.unsplash.com/photo-1524502397800-2eeaad7c3fe5?w=1600&q=80&fit=crop'); }
.slide-5 { background-image: url('https://images.unsplash.com/photo-1500917293891-ef795e70e1f6?w=1600&q=80&fit=crop'); }

/* Overlay — darkens image, creates depth */
.slider::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, rgba(16,15,13,0.72) 0%, rgba(16,15,13,0.2) 60%, rgba(16,15,13,0.1) 100%),
    linear-gradient(to top, rgba(16,15,13,0.6) 0%, transparent 50%);
  z-index: 1;
  pointer-events: none;
}

/* ─── NAV ─── */

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 40px 52px;
}

.nav-brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--n100);
  text-decoration: none;
  opacity: 0.9;
}

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--n300);
  text-decoration: none;
  transition: color 0.3s ease;
}

.nav-links a:hover { color: var(--n100); }

/* ─── HERO COPY ─── */

.hero {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 5;
  padding: 0 52px 56px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.hero-left { max-width: 540px; }

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--n300);
  margin-bottom: 20px;
  display: block;
}

.hero-title {
  font-size: clamp(34px, 4.5vw, 58px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.05;
  color: var(--n100);
  margin-bottom: 24px;
}

.hero-body {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--n300);
  max-width: 380px;
}

.hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 20px;
}

.hero-cta {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--n100);
  text-decoration: none;
  border-bottom: 1px solid var(--n400);
  padding-bottom: 4px;
  transition: border-color 0.3s ease, color 0.3s ease;
}

.hero-cta:hover {
  color: var(--n200);
  border-color: var(--n200);
}

/* ─── SLIDE COUNTER ─── */

.slide-counter {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--n400);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 12px;
}

.counter-dots {
  display: flex;
  gap: 6px;
}

.counter-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--n500);
  transition: background 0.4s ease;
  cursor: pointer;
}

.counter-dot.active { background: var(--n300); }

/* ─── FADE IN ON LOAD ─── */

nav, .hero {
  opacity: 0;
  animation: fadeUp 1.2s ease 0.4s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- SLIDER -->
<div class="slider" id="slider">
  <div class="slide slide-1 active"></div>
  <div class="slide slide-2"></div>
  <div class="slide slide-3"></div>
  <div class="slide slide-4"></div>
  <div class="slide slide-5"></div>
</div>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="/">Earl Kiu</a>
  <ul class="nav-links">
    <li><a href="/work">Work</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/session">Book a Session</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-left">
    <span class="hero-eyebrow">Portrait · Kuala Lumpur</span>
    <h1 class="hero-title">You've never seen<br>yourself like this</h1>
    <p class="hero-body">A portrait session for those ready to be seen — fully, quietly, without pretense.</p>
  </div>

  <div class="hero-right">
    <a class="hero-cta" href="/session">Book a session</a>
    <div class="slide-counter">
      <div class="counter-dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('dots');
  let current = 0;
  let timer;

  // Build dots
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'counter-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  function getDots() { return document.querySelectorAll('.counter-dot'); }

  function goTo(index) {
    slides[current].classList.remove('active');
    getDots()[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    getDots()[current].classList.add('active');
    clearInterval(timer);
    timer = setInterval(advance, 5000);
  }

  function advance() {
    goTo((current + 1) % slides.length);
  }

  timer = setInterval(advance, 5000);
</script>
</body>
</html>
