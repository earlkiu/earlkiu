      <svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="arrow" id="next" aria-label="Next">
      <svg viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10"/></svg>
    </button>
  </div>
</div>

<script>
  const isMobile = window.matchMedia('(max-width: 767px)').matches;
  const prefix = isMobile ? '.slide-m-' : '.slide-d-';

  // Collect only visible slides for current breakpoint
  const slides = Array.from(document.querySelectorAll('[class*="' + (isMobile ? 'slide-m-' : 'slide-d-') + '"]'))
    .filter(el => getComputedStyle(el).display !== 'none');

  // Hide all opposite breakpoint slides
  document.querySelectorAll(isMobile ? '[class*="slide-d-"]' : '[class*="slide-m-"]')
    .forEach(el => el.style.display = 'none');

  slides[0].classList.add('active');

  const dotsContainer = document.getElementById('dots');
  let current = 0;
  let timer;

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  function getDots() { return document.querySelectorAll('.dot'); }

  function goTo(index) {
    slides[current].classList.remove('active');
    getDots()[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    getDots()[current].classList.add('active');
    clearInterval(timer);
    timer = setInterval(advance, 6000);
  }

  function advance() { goTo(current + 1); }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Swipe support
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) diff > 0 ? goTo(current + 1) : goTo(current - 1);
  }, { passive: true });

  timer = setInterval(advance, 6000);
</script>
