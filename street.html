<style>
@import url('https://use.typekit.net/pur8tye.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {

.slider::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, rgba(16,15,13,0.5) 0%, rgba(16,15,13,0.1) 60%, rgba(16,15,13,0.05) 100%),
    linear-gradient(to top, rgba(16,15,13,0.7) 0%, transparent 40%);

  pointer-events: none;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 40px 52px;
}

@media (max-width: 767px) { nav { padding: 28px 24px; } .nav-left { gap: 2px; } }

.nav-left { display: flex; flex-direction: column; gap: 2px; }

.nav-brand {

@media (max-width: 767px) { .nav-links { gap: 20px; } }

.nav-links a {

  text-decoration: none;

}

.bottom {
  position: fixed;

@media (max-width: 767px) { .bottom { padding: 0 24px 32px; } }

  transition: color 0.3s ease, border-color 0.3s ease;
}

.gallery-link:hover { color: var(--n300); border-color: var(--n300); }

.bottom-right { display: flex; align-items: center; gap: 16px; }

.arrow {
  width: 28px;
  height: 28px;
  border: 1px solid var(--n500);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.3s ease;
  flex-shrink: 0;
  background: none;
}

.arrow:hover { border-color: var(--n300); }

.arrow svg {
  width: 12px;
  height: 12px;
  stroke: var(--n300);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.dots { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 4px;
  height: 4px;
  background: var(--n500);
  cursor: pointer;
  transition: background 0.4s ease;
  flex-shrink: 0;
}

.dot.active { background: var(--n300); }

nav, .bottom {
  opacity: 0;
  animation: fadeUp 1.2s ease 0.4s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }

<div class="bottom">
  <a class="gallery-link" href="/gallery.html">Gallery</a>
  <div class="bottom-right">
    <button class="arrow" id="prev" aria-label="Previous">
      <svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="arrow" id="next" aria-label="Next">
      <svg viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10"/></svg>
    </button>
  </div>
</div>

<script>
  const isMobile = window.matchMedia('(max-width: 767px)').matches;

  // Collect visible slides for current breakpoint
  const slides = Array.from(document.querySelectorAll('[class*="' + (isMobile ? 'slide-m-' : 'slide-d-') + '"]'))
    .filter(el => getComputedStyle(el).display !== 'none');

  // Hide opposite breakpoint
  document.querySelectorAll(isMobile ? '[class*="slide-d-"]' : '[class*="slide-m-"]')
    .forEach(el => el.style.display = 'none');

  // Shuffle for street
  for (let i = slides.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [slides[i], slides[j]] = [slides[j], slides[i]];
  }

  slides[0].classList.add('active');

  const dotsContainer = document.getElementById('dots');
  let current = 0;
  let timer;

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  function getDots() { return document.querySelectorAll('.dot'); }

  function goTo(index) {
    slides[current].classList.remove('active');
    getDots()[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    getDots()[current].classList.add('active');
    clearInterval(timer);
    timer = setInterval(advance, 6000);
  }

  function advance() { goTo(current + 1); }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Swipe
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) diff > 0 ? goTo(current + 1) : goTo(current - 1);
  }, { passive: true });

  timer = setInterval(advance, 6000);
</script>
