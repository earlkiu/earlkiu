<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing — Earl Kiu</title>
<meta name="description" content="Writing by Earl Kiu — photographer based in Kuala Lumpur.">
<link rel="stylesheet" href="style.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6DM42N1462"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-6DM42N1462');
</script>
</head>
<body>

  <header class="site-header">
    <div class="nav-left">
      <a class="nav-brand" href="/">Earl Kiu</a>
      <span class="nav-location">Writing</span>
    </div>
  </header>

  <div class="mobile-back" id="mobile-back" style="display:none;" onclick="goBack()">
    <span>&larr; All writing</span>
  </div>

  <div class="writing-layout">

    <nav class="entry-list" id="entry-list">
      <a class="entry" onclick="loadEntry(0)">
        <span class="entry-date">May 2026</span>
        <span class="entry-title">Tending to</span>
      </a>
      <a class="entry" onclick="loadEntry(1)">
        <span class="entry-date">May 2026</span>
        <span class="entry-title">The worst thing</span>
      </a>
      <a class="entry" onclick="loadEntry(2)">
        <span class="entry-date">May 2026</span>
        <span class="entry-title">Common sense</span>
      </a>
      <!-- Add new entries above this line, newest first -->
    </nav>

    <div class="entry-panel" id="entry-panel">
      <div class="panel-empty">Select a piece to read</div>
    </div>

  </div>

  <footer class="site-footer">
    <span>Earl Kiu is a photographer based in Kuala Lumpur.&ensp;<a href="https://earlkiu.com">earlkiu.com</a></span>
  </footer>

<script>
  const entries = [
    {
      date: 'May 2026',
      title: 'Tending to',
      body: '<p>In stillness, I found peace.<br>In silence, I found solitude.</p><p>In this space between &mdash;<br>where no one needs tending to,<br>away from noise,<br>away from popular opinion,<br>I stay true.</p>'
    },
    {
      date: 'May 2026',
      title: 'The worst thing',
      body: '<p>The worst thing a photographer can be, is to forget the person in front of us is a human.</p>'
    },
    {
      date: 'May 2026',
      title: 'Common sense',
      body: '<p>Only common among people from the same culture and similar background.</p>'
    }
  ];

  let current = null;

  function loadEntry(index) {
    current = index;
    const entry = entries[index];

    document.querySelectorAll('.entry').forEach((el, i) => el.classList.toggle('active', i === index));

    const prevDisabled = index === 0 ? 'disabled' : '';
    const nextDisabled = index === entries.length - 1 ? 'disabled' : '';

    document.getElementById('entry-panel').innerHTML = `
      <div class="entry-meta"><span class="entry-date">${entry.date}</span></div>
      <h1 class="entry-heading">${entry.title}</h1>
      <div class="entry-content">${entry.body}</div>
      <nav class="entry-nav">
        <a class="${prevDisabled}" onclick="navigate(-1)">&larr; Prev</a>
        <a class="${nextDisabled}" onclick="navigate(1)">Next &rarr;</a>
      </nav>
    `;

    if (window.innerWidth <= 767) {
      document.getElementById('entry-list').classList.add('hidden');
      document.getElementById('entry-panel').classList.remove('hidden');
      document.getElementById('mobile-back').style.display = 'flex';
    }
  }

  function navigate(dir) {
    const next = current + dir;
    if (next < 0 || next >= entries.length) return;
    loadEntry(next);
    window.scrollTo(0, 0);
  }

  function goBack() {
    document.getElementById('entry-list').classList.remove('hidden');
    document.getElementById('entry-panel').classList.add('hidden');
    document.getElementById('mobile-back').style.display = 'none';
  }
</script>

</body>
</html>
